name: Inspect Steamcommunity 302 CLI

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  inspect:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Download official Linux package
        run: |
          curl --fail --location --show-error \
            --output steam302.tar.gz \
            https://www.dogfight360.com/blog/wp-content/uploads/2026/02/steamcommunity_302_Linux_AMD64_V14.0.02.tar.gz
          printf '%s  %s\n' \
            5e006f015c807679ef800a87fa7b788562901ad04d7899ade2648f82b4c4a11f \
            steam302.tar.gz | sha256sum --check
          tar -xzf steam302.tar.gz

      - name: Inspect CLI without root privileges
        working-directory: Steamcommunity_302
        run: |
          chmod +x steamcommunity_302.cli steamcommunity_302.caddy
          timeout 10s ./steamcommunity_302.cli --help > cli-help.log 2>&1 || true
          timeout 15s ./steamcommunity_302.cli > cli-run.log 2>&1 || true
          find . -maxdepth 2 -type f -printf '%P\n' | sort > generated-files.log
          if [ -f S302.ini ]; then
            cp S302.ini S302.generated.ini
          fi

      - name: Upload inspection output
        uses: actions/upload-artifact@v4
        with:
          name: steam302-cli-inspection
          path: |
            Steamcommunity_302/cli-help.log
            Steamcommunity_302/cli-run.log
            Steamcommunity_302/generated-files.log
            Steamcommunity_302/S302.generated.ini
          if-no-files-found: warn
          retention-days: 1

  inspect-arch-gui:
    runs-on: ubuntu-24.04
    container: archlinux:latest
    timeout-minutes: 12
    steps:
      - name: Install Arch Linux runtime dependencies
        run: |
          pacman -Syu --noconfirm
          pacman -S --noconfirm \
            ca-certificates curl coreutils findutils grep libnetfilter_queue \
            fontconfig freetype2 imagemagick libglvnd libice libsm libx11 \
            libxext libxkbcommon libxrender nss tar ttf-dejavu xdotool \
            xorg-server-xvfb

      - name: Download official Linux package
        run: |
          curl --fail --location --show-error \
            --output steam302.tar.gz \
            https://www.dogfight360.com/blog/wp-content/uploads/2026/02/steamcommunity_302_Linux_AMD64_V14.0.02.tar.gz
          printf '%s  %s\n' \
            5e006f015c807679ef800a87fa7b788562901ad04d7899ade2648f82b4c4a11f \
            steam302.tar.gz | sha256sum --check
          tar -xzf steam302.tar.gz

      - name: Start official GUI in an isolated virtual display
        working-directory: Steamcommunity_302
        env:
          HOME: /tmp/steam302-home
        run: |
          mkdir -p "$HOME"
          chmod +x Steamcommunity_302 steamcommunity_302.cli steamcommunity_302.caddy
          Xvfb :99 -screen 0 1280x800x24 > xvfb.log 2>&1 &
          xvfb_pid=$!
          export DISPLAY=:99
          ./Steamcommunity_302 > arch-gui.log 2>&1 &
          app_pid=$!
          sleep 15
          xdotool search --name '.*' getwindowname %@ > arch-windows.log 2>&1 || true
          import -display :99 -window root arch-gui.png || true
          sleep 5
          kill "$app_pid" 2>/dev/null || true
          wait "$app_pid" 2>/dev/null || true
          kill "$xvfb_pid" 2>/dev/null || true
          wait "$xvfb_pid" 2>/dev/null || true
          find . -maxdepth 2 -type f -printf '%P\n' | sort > arch-generated-files.log
          if [ -f S302.ini ]; then
            cp S302.ini S302.arch.generated.ini
          fi
          find "$HOME" -maxdepth 5 -type f -printf '%p\n' | sort > arch-home-files.log

      - name: Upload Arch GUI inspection output
        uses: actions/upload-artifact@v4
        with:
          name: steam302-arch-gui-inspection
          path: |
            Steamcommunity_302/arch-gui.log
            Steamcommunity_302/arch-gui.png
            Steamcommunity_302/arch-generated-files.log
            Steamcommunity_302/arch-home-files.log
            Steamcommunity_302/arch-windows.log
            Steamcommunity_302/xvfb.log
            Steamcommunity_302/S302.arch.generated.ini
          if-no-files-found: warn
          retention-days: 1
