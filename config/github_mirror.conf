# GitHub 下载镜像源配置
# 工具箱自动按优先级依次尝试，最快响应自动优先选用。
# 如需临时关闭镜像加速，将 github_enable 设为 false。
github_enable=true

# 下载源列表（按优先级排列）
# GitHub 官方源，国内部分网络可能不稳定
mirror_1="https://github.com"
# GitClone 国内镜像，GitHub 不可用时自动切换
mirror_2="https://gitclone.com/github.com/"
# ghproxy 镜像，支持 Release 和 Raw 文件下载
mirror_3="https://ghproxy.vip/https://github.com/"
# ghp.ci 镜像，支持 Release 和 Raw 文件下载
mirror_4="https://ghp.ci/https://github.com/"
